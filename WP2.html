<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout Split Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #1D9E75;
    --green-light: #E1F5EE;
    --green-dark: #0F6E56;
    --amber: #BA7517;
    --amber-light: #FAEEDA;
    --amber-border: #FAC775;
    --blue: #185FA5;
    --blue-light: #E6F1FB;
    --purple: #534AB7;
    --purple-light: #EEEDFE;
    --coral: #993C1D;
    --coral-light: #FAECE7;
    --teal-deep: #085041;
    --bg: #f7f6f2;
    --card: #ffffff;
    --text: #1a1a18;
    --text-muted: #6b6b66;
    --text-hint: #a0a09a;
    --border: rgba(0,0,0,0.1);
    --border-md: rgba(0,0,0,0.15);
    --radius: 10px;
    --radius-lg: 14px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  .header {
    background: var(--teal-deep);
    padding: 2rem 1.5rem 1.5rem;
    color: #fff;
  }

  .header-inner { max-width: 700px; margin: 0 auto; }

  .header h1 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.3px;
    margin-bottom: 4px;
  }

  .header p {
    font-size: 13px;
    opacity: 0.65;
    margin-bottom: 1.2rem;
  }

  .overall-progress {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .overall-bar-wrap {
    flex: 1;
    height: 5px;
    background: rgba(255,255,255,0.2);
    border-radius: 20px;
    overflow: hidden;
  }

  .overall-bar {
    height: 100%;
    background: #5DCAA5;
    border-radius: 20px;
    transition: width 0.4s ease;
  }

  .overall-pct {
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    opacity: 0.8;
    min-width: 36px;
    text-align: right;
  }

  .tabs-wrap {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .tabs {
    max-width: 700px;
    margin: 0 auto;
    display: flex;
    overflow-x: auto;
    scrollbar-width: none;
  }

  .tabs::-webkit-scrollbar { display: none; }

  .tab {
    flex-shrink: 0;
    padding: 14px 18px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    white-space: nowrap;
    user-select: none;
  }

  .tab:hover { color: var(--text); }
  .tab.active { color: var(--green-dark); border-bottom-color: var(--green); }
  .tab.complete { color: var(--green); }

  .content { max-width: 700px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }

  .day-header { margin-bottom: 1.2rem; }

  .day-title {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.3px;
    margin-bottom: 3px;
  }

  .day-sub {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 1rem;
  }

  .progress-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 1rem;
  }

  .progress-label {
    font-size: 12px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    min-width: 90px;
  }

  .prog-bar-wrap {
    flex: 1;
    height: 5px;
    background: #e8e6e0;
    border-radius: 20px;
    overflow: hidden;
  }

  .prog-bar {
    height: 100%;
    background: var(--green);
    border-radius: 20px;
    transition: width 0.3s ease;
  }

  .warning-box {
    background: var(--amber-light);
    border: 1px solid var(--amber-border);
    border-radius: var(--radius);
    padding: 10px 14px;
    font-size: 12px;
    color: var(--amber);
    margin-bottom: 1rem;
    display: flex;
    gap: 8px;
    align-items: flex-start;
  }

  .warning-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }

  .section-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-hint);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin: 1.3rem 0 0.5rem;
    font-family: 'DM Mono', monospace;
  }

  .warmup-card {
    background: var(--green-light);
    border-radius: var(--radius);
    padding: 10px 14px;
    font-size: 13px;
    color: var(--green-dark);
    margin-bottom: 0.5rem;
    border: 1px solid rgba(29,158,117,0.2);
  }

  .warmup-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 4px;
    opacity: 0.7;
  }

  .ex-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 14px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--card);
    margin-bottom: 6px;
    cursor: pointer;
    transition: background 0.12s, opacity 0.2s;
  }

  .ex-row:hover { background: #fafaf8; }

  .ex-row.done {
    opacity: 0.45;
    background: #fafaf8;
  }

  .checkbox {
    width: 20px;
    height: 20px;
    min-width: 20px;
    border-radius: 5px;
    border: 1.5px solid var(--border-md);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 1px;
    transition: all 0.15s;
    background: #fff;
  }

  .checkbox.checked {
    background: var(--green);
    border-color: var(--green);
  }

  .tick {
    width: 10px;
    height: 6px;
    border-left: 2px solid #fff;
    border-bottom: 2px solid #fff;
    transform: rotate(-45deg) translateY(-1px);
  }

  .ex-body { flex: 1; min-width: 0; }

  .ex-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 6px;
    line-height: 1.4;
  }

  .ex-detail {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 3px;
    font-family: 'DM Mono', monospace;
  }

  .ex-note {
    font-size: 11.5px;
    color: var(--green-dark);
    margin-top: 4px;
    font-style: italic;
    line-height: 1.5;
  }

  .badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 20px;
    font-style: normal;
    font-family: 'DM Sans', sans-serif;
  }

  .badge-superset { background: var(--blue-light); color: var(--blue); }
  .badge-giant { background: var(--purple-light); color: var(--purple); }
  .badge-dropset { background: var(--coral-light); color: var(--coral); }

  .cardio-card {
    background: #f0ede6;
    border-radius: var(--radius);
    padding: 12px 16px;
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 1.2rem;
    border: 1px solid var(--border);
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .cardio-icon { font-size: 16px; }

  .reset-btn {
    display: block;
    font-size: 12px;
    color: var(--text-hint);
    cursor: pointer;
    background: none;
    border: none;
    padding: 0;
    margin-top: 1rem;
    text-decoration: underline;
    font-family: 'DM Sans', sans-serif;
  }

  .reset-btn:hover { color: var(--text-muted); }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <h1>Workout Split</h1>
    <p>Hypertrophy · Strength · LB Safe</p>
    <div class="overall-progress">
      <div class="overall-bar-wrap">
        <div class="overall-bar" id="overall-bar" style="width:0%"></div>
      </div>
      <div class="overall-pct" id="overall-pct">0%</div>
    </div>
  </div>
</div>

<div class="tabs-wrap">
  <div class="tabs" id="tabs"></div>
</div>

<div class="content" id="content"></div>

<script>

const days = 
 [
  {
    label: "Day 1", title: "Upper body — push focus", sub: "Chest · Shoulders · Triceps",
    warmup: "5 min incline treadmill walk + shoulder rotations + band pull-aparts (2×15)",
    warning: null,
    exercises: [
      { name: "Barbell Flat Bench Press", detail: "4 × 8 (heavy)", note: "Control the eccentric 3 sec down. No arching lower back off bench." },
      { name: "Incline Dumbbell Press", detail: "4 × 12–15", note: "Full stretch at bottom. 30° incline, not 45°." },
      { name: "Cable Chest Fly (low to high)", detail: "3 × 15", note: "Upper chest isolation without spinal load." },
      { name: "Dumbbell Shoulder Press", detail: "4 × 10", note: "Seated. Keep lower back flat against pad.", section: "shoulders" },
      { name: "Lateral Raises — Drop Set", detail: "3 drop sets: 15 → 12 → failure", note: "Controlled tempo. No swinging.", badge: "dropset" },
      { name: "Overhead Cable Tricep Extension", detail: "3 × 12", note: null, section: "triceps" },
      { name: "Tricep Dips (bench/assisted)", detail: "3 × 12–15", note: "Lean slightly forward for chest emphasis." },
    ],
    cardio: "15 min incline treadmill walk"
  },
  {
    label: "Day 2", title: "Lower body — quad & glute focus", sub: "Quads · Glutes · Hamstrings · Calves",
    warmup: "5 min stationary bike + hip flexor stretch + glute activation band walks (2×15)",
    warning: "L4-L5: No barbell back squats or Romanian deadlifts. All work is machine/supported or low-spinal-load.",
    exercises: [
      { name: "Leg Press (feet shoulder-width, mid-platform)", detail: "4 × 12", note: "Do NOT lock knees at top. Keep lower back against pad throughout." },
      { name: "Hack Squat Machine", detail: "4 × 10", note: "Safe spinal alternative to barbell squats. Full depth if comfortable." },
      { name: "Bulgarian Split Squat (light DBs)", detail: "3 × 10 each leg", note: "Keep torso upright. Don't let front knee cave in." },
      { name: "Seated Hamstring Curl", detail: "4 × 12", note: "Prefer seated over lying — safer for L4-L5.", section: "hamstrings & isolation" },
      { name: "Leg Extension", detail: "3 × 15", note: "Full extension. Pause 1 sec at top." },
      { name: "Glute Bridge (barbell across hips)", detail: "4 × 15", note: "Drive through heels. Squeeze glutes at top. Safe for back.", section: "glutes & calves" },
      { name: "Standing Calf Raise (machine)", detail: "4 × 15 — pause at top", note: null },
    ],
    cardio: "20 min stair climber or cycling (low resistance)"
  },
 {
  label: "Day 3",
  title: "Core + forearms — stability & grip",
  sub: "Deep core · Obliques · Grip · Forearms",
  warmup: "5 min light cardio + wrist rotations + cat-cow + pelvic tilts",
  warning: "L4-L5: Avoid spinal flexion. Keep all core work neutral spine.",
  progression: "Increase hold time, reps, or grip load weekly",
  exercises: [

    // CORE BLOCK
    { name: "Dead Bug", detail: "3 × 10 per side", note: "Lower back pressed into floor." },
    { name: "Pallof Press", detail: "3 × 12 per side", note: "Anti-rotation control." },
    { name: "Hanging Knee Raise", detail: "3 × 10–12", note: "No swinging." },
    { name: "Plank", detail: "3 × 45–60 sec", note: "Glutes tight, ribs down." },

    // FOREARM / GRIP BLOCK
    { name: "Farmer Carry (heavy)", detail: "4 × 40–60 sec", note: "Primary grip builder. Stay upright.", badge: "functional" },
    { name: "Wrist Curl (DB or barbell)", detail: "3 × 15", note: "Slow eccentric.", section: "forearms" },
    { name: "Reverse Wrist Curl", detail: "3 × 15", note: "Balances forearm development." },
    { name: "Hammer Curl (light)", detail: "3 × 12", note: "Brachialis + forearm thickness." },
    { name: "Dead Hang (bar hold)", detail: "2–3 × max time", note: "Passive grip endurance finisher." }

  ],
  cardio: "15–20 min incline walk or rowing"
},
  {
    label: "Day 4", title: "Shoulders & arms", sub: "Delts · Biceps · Triceps",
    warmup: "5 min elliptical + shoulder CARs + band pull-aparts",
    warning: null,
    exercises: [
      { name: "Seated Dumbbell Shoulder Press", detail: "4 × 10 (heavier than Day 1)", note: "Seated to protect lower back. Full range." },
      { name: "Cable Lateral Raise", detail: "4 × 15 per side", note: "Single-arm cable keeps constant tension vs dumbbells." },
      { name: "Rear Delt Fly (cable or machine)", detail: "4 × 15", note: "Elbows slightly bent. Lead with elbows not hands." },
      { name: "Face Pull (rope cable)", detail: "3 × 20", note: "Pull to eye level. External rotate at end. Essential for shoulder health." },
      { name: "EZ Bar Curl → Rope Pushdown Superset", detail: "4 × 10 each", note: "Minimal rest between. Full stretch on curl, full lockout on pushdown.", badge: "superset", section: "arms" },
      { name: "Incline DB Curl (60° incline)", detail: "3 × 12", note: "Long head bias. Elbows stay behind body." },
      { name: "Overhead DB Tricep Extension", detail: "3 × 12", note: "Elbows close. Long head emphasis. Keep core braced." },
    ],
    cardio: "15 min moderate cardio — bike or cross trainer"
  },
  {
    label: "Day 5", title: "Legs — hamstring & posterior chain", sub: "Hamstrings · Glutes · Calves · Stability",
    warmup: "5 min bike + lying hip stretch + glute bridges (2×15 bodyweight)",
    warning: "L4-L5: Posterior chain focus but still machine-dominant. No conventional deadlifts.",
    exercises: [
      { name: "Leg Press (feet high on platform)", detail: "4 × 12", note: "High foot placement shifts load to hamstrings and glutes." },
      { name: "Seated Leg Curl → Leg Extension Superset", detail: "4 × 12 each, no rest between", note: "Keeps quads and hams both pumped.", badge: "superset" },
      { name: "Glute-Ham Raise (machine, assisted)", detail: "3 × 8–10", note: "If unavailable, use lying leg curl.", section: "posterior chain" },
      { name: "Rear-Foot Elevated Split Squat (light DBs)", detail: "3 × 12 per leg", note: "Torso upright. Hits glutes and quads without spinal load." },
      { name: "Single-Leg Calf Raise (on step)", detail: "4 × 15 per side", note: "Full range — deep stretch at bottom.", section: "calves & glutes" },
      { name: "Hip Thrust (barbell or machine)", detail: "4 × 12", note: "Best glute builder that keeps spine safe. Full extension at top." },
    ],
    cardio: "20 min stair climber or rowing"
  },
  {
    label: "Day 6", title: "Chest & back — pull power", sub: "Chest · Lats · Rhomboids · Traps",
    warmup: "5 min elliptical + thoracic rotations + lat stretch",
    warning: null,
    exercises: [
      { name: "Weighted Pull-Up (or lat pulldown)", detail: "5 × 5–8", note: "If bodyweight is easy, add 5-10kg belt. Full range." },
      { name: "Chest-Supported Dumbbell Row", detail: "4 × 10–12 per arm", note: "Chest on incline bench — eliminates all lower back involvement." },
      { name: "Incline Dumbbell Press", detail: "4 × 10", note: "Upper chest emphasis. Different angle from Day 1.", section: "chest" },
      { name: "Seated Cable Row (close grip)", detail: "4 × 12", note: "Retract scapula first, then pull. Don't lean back excessively.", section: "rows" },
      { name: "DB Flat Press → DB Pullover", detail: "3 rounds: 12 press + 15 pullover", note: "No rest between. Rest 90 sec after each round.", badge: "giant", section: "giant set" },
      { name: "Face Pull (rope)", detail: "3 × 20", note: "Essential for rotator cuff and posture.", section: "upper back & traps" },
      { name: "Paused Shrugs (DB)", detail: "3 × 12 — 2 sec pause at top", note: "Traps respond to slow, contracted reps." },
    ],
    cardio: "15–20 min incline walk or bike"
  }
];
const state = {};
days.forEach((d, di) => d.exercises.forEach((_, ei) => { state[`${di}-${ei}`] = false; }));
let activeDay = 0;

function totalExercises() { return days.reduce((s, d) => s + d.exercises.length, 0); }
function totalDone() { return Object.values(state).filter(Boolean).length; }
function dayDone(di) { return days[di].exercises.filter((_, ei) => state[`${di}-${ei}`]).length; }

function updateOverall() {
  const pct = Math.round((totalDone() / totalExercises()) * 100);
  document.getElementById('overall-bar').style.width = pct + '%';
  document.getElementById('overall-pct').textContent = pct + '%';
}

function renderTabs() {
  const container = document.getElementById('tabs');
  container.innerHTML = days.map((d, i) => {
    const done = dayDone(i) === d.exercises.length;
    return `<div class="tab${i === activeDay ? ' active' : ''}${done ? ' complete' : ''}" onclick="setDay(${i})">${d.label}${done ? ' ✓' : ''}</div>`;
  }).join('');
}

function renderDay() {
  const d = days[activeDay];
  const done = dayDone(activeDay);
  const total = d.exercises.length;
  const pct = Math.round((done / total) * 100);
  let html = `<div class="day-header">
    <div class="day-title">${d.title}</div>
    <div class="day-sub">${d.sub}</div>
    <div class="progress-row">
      <div class="progress-label">${done} / ${total} done</div>
      <div class="prog-bar-wrap"><div class="prog-bar" style="width:${pct}%"></div></div>
    </div>
  </div>`;

  if (d.warning) html += `<div class="warning-box"><div class="warning-icon">⚠</div><div>${d.warning}</div></div>`;

  html += `<div class="section-label">warm-up</div>
  <div class="warmup-card">
    <div class="warmup-label">Before you begin</div>
    ${d.warmup}
  </div>`;

  let lastSection = '';
  d.exercises.forEach((ex, ei) => {
    const key = `${activeDay}-${ei}`;
    const checked = state[key];
    if (ex.section && ex.section !== lastSection) {
      lastSection = ex.section;
      html += `<div class="section-label">${ex.section}</div>`;
    } else if (ei === 0) {
      html += `<div class="section-label">compound lifts</div>`;
    }
    const badge = ex.badge ? `<span class="badge badge-${ex.badge}">${ex.badge}</span>` : '';
    html += `<div class="ex-row${checked ? ' done' : ''}" onclick="toggle('${key}')">
      <div class="checkbox${checked ? ' checked' : ''}">${checked ? '<div class="tick"></div>' : ''}</div>
      <div class="ex-body">
        <div class="ex-name">${ex.name}${badge}</div>
        <div class="ex-detail">${ex.detail}</div>
        ${ex.note ? `<div class="ex-note">${ex.note}</div>` : ''}
      </div>
    </div>`;
  });

  html += `<div class="cardio-card"><span class="cardio-icon">🚴</span><span><strong>Cardio finish:</strong> ${d.cardio}</span></div>`;
  html += `<button class="reset-btn" onclick="resetDay()">Reset today's progress</button>`;

  document.getElementById('content').innerHTML = html;
}

function toggle(key) {
  state[key] = !state[key];
  renderTabs();
  renderDay();
  updateOverall();
}

function setDay(i) {
  activeDay = i;
  renderTabs();
  renderDay();
}

function resetDay() {
  days[activeDay].exercises.forEach((_, ei) => { state[`${activeDay}-${ei}`] = false; });
  renderTabs();
  renderDay();
  updateOverall();
}

renderTabs();
renderDay();
updateOverall();
</script>
</body>
</html>
